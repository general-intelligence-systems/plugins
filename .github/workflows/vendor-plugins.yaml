name: Vendor plugins

# Vendors external plugin repos into this marketplace repo and regenerates
# .claude-plugin/marketplace.json from their manifests.
# Config: vendor-plugins.json — logic: bin/vendor-plugins.rb.
# Drop the workflow, script, and config into any marketplace repo to reuse it.

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - vendor-plugins.json
      - bin/vendor-plugins.rb
      - .github/workflows/vendor-plugins.yaml

permissions:
  contents: write

concurrency:
  group: vendor-plugins
  cancel-in-progress: false

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor repos and regenerate marketplace.json
        run: ruby bin/vendor-plugins.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Vendored plugins are up to date."
            exit 0
          fi
          git commit -m "chore: update vendored plugins"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
