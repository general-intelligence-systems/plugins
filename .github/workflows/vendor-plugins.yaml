name: Vendor plugins

# Vendors external plugin repos into this marketplace repo and regenerates
# .claude-plugin/marketplace.json from their manifests.
# Configure the list in the VENDOR_PLUGINS env below — logic: .github/bin/vendor-plugins.rb.
# Drop the workflow + script into any marketplace repo and edit the list to reuse it.

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/bin/vendor-plugins.rb
      - .github/bin/generate-readme
      - README.md.erb
      - .github/workflows/vendor-plugins.yaml

permissions:
  contents: write

concurrency:
  group: vendor-plugins
  cancel-in-progress: false

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor repos and regenerate marketplace.json
        env:
          VENDOR_PLUGINS: |
            - repo: cnstudio-io/plugins
              path: cnstudio
        run: ruby .github/bin/vendor-plugins.rb

      - name: Regenerate README.md
        run: ruby .github/bin/generate-readme

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Vendored plugins are up to date."
            exit 0
          fi
          git commit -m "chore: update vendored plugins"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
